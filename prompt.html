<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prompt - Prompthere</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ==============================
       Header / Navigation
  ============================== -->
  <header class="header">
    <div class="container nav">

      <div class="logo">
        <a href="index.html">Prompthere</a>
      </div>

      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="prompts.html">Prompts</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>

    </div>
  </header>


  <!-- ==============================
       Prompt Detail Section
  ============================== -->
  <section class="page">
    <div class="container small">

      <h1 id="prompt-title"></h1>
      <p id="prompt-description"></p>
      <pre id="prompt-text"></pre>

      <button id="copy-btn">Copy Prompt</button>

    </div>
  </section>


  <!-- ==============================
       Footer
  ============================== -->
  <footer class="footer">
    <p>© <span id="year"></span> Prompthere</p>
  </footer>


  <!-- Main site script -->
  <script src="script.js"></script>

  <!-- Prompt detail page script -->
  <script>

    // Get the slug from the URL query string (e.g. ?slug=my-prompt)
    const params = new URLSearchParams(window.location.search);
    const slug   = params.get("slug");

    // Fetch all prompts and find the one matching the slug
    fetch("data/prompts.json")
      .then(res => res.json())
      .then(data => {

        const prompt = data.find(p => p.slug === slug);

        // Guard: if no matching prompt found, show a fallback message
        if (!prompt) {
          document.getElementById("prompt-title").textContent = "Prompt not found.";
          return;
        }

        // Populate the page with prompt data
        document.getElementById("prompt-title").textContent       = prompt.title;
        document.getElementById("prompt-description").textContent = prompt.description;
        document.getElementById("prompt-text").textContent        = prompt.prompt;

        // Copy prompt text to clipboard on button click
        document.getElementById("copy-btn").addEventListener("click", () => {
          navigator.clipboard.writeText(prompt.prompt);
          alert("Prompt copied!");
        });

      });

  </script>

</body>
</html>
