<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prompt - PromptHere</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <!-- ==============================
       Header / Navigation
  ============================== -->
  <header class="header">
    <div class="container nav">

      <div class="logo">
        <a href="index.html">PromptHere</a>
      </div>

      <nav class="desktop-nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="prompts.html">Prompts</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="terms&services.html">Terms &amp; Services</a></li>
        </ul>
      </nav>

      <div class="nav-right">
        <label class="theme-toggle">
          <i class="fa-solid fa-sun"></i>
          <input type="checkbox" id="theme-toggle">
          <i class="fa-solid fa-moon"></i>
        </label>
        <button class="hamburger" id="hamburger" aria-label="Open menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>

    </div>
  </header>

  <!-- Mobile Drawer -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <nav class="drawer" id="drawer">
    <button class="drawer-close" id="drawer-close" aria-label="Close menu">&times;</button>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="prompts.html">Prompts</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="terms&services.html">Terms &amp; Services</a></li>
    </ul>
  </nav>


  <!-- ==============================
       Prompt Detail Section
  ============================== -->
  <section class="page">
    <div class="container small">
      <h1 id="prompt-title"></h1>
      <p id="prompt-description"></p>
      <pre id="prompt-text"></pre>
      <button id="copy-btn">Copy Prompt</button>
    </div>
  </section>


  <!-- ==============================
       Footer
  ============================== -->
  <footer class="footer">
    <p>© <span id="year"></span> PromptHere</p>
  </footer>

  <script src="script.js"></script>

  <!-- Prompt detail page script -->
  <script>
    const params = new URLSearchParams(window.location.search);
    const slug   = params.get("slug");

    fetch("data/prompts.json")
  .then(res => res.json())
  .then(data => {
    const prompt = data.find(p => p.slug === slug);

    if (!prompt) {
      document.getElementById("prompt-title").textContent = "Prompt not found.";
      return;
    }

    // Premium gate check
    if (prompt.premium) {
      const key = "unlocked_" + slug;

      if (!sessionStorage.getItem(key)) {
        // No unlock token — send back to prompts page
        window.location.href = "prompts.html";
        return;
      }

      // Token found — consume it immediately so it can't be reused
      sessionStorage.removeItem(key);
    }

        document.getElementById("prompt-title").textContent       = prompt.title;
        document.getElementById("prompt-description").textContent = prompt.description;
        document.getElementById("prompt-text").textContent        = prompt.prompt;

        document.getElementById("copy-btn").addEventListener("click", () => {
          navigator.clipboard.writeText(prompt.prompt);
          alert("Prompt copied!");
        });
      });
  </script>

</body>
</html>
